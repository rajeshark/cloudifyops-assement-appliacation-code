version: 0.2

phases:

  install:
    runtime-versions:
      docker: 20

    commands:

      - yum install -y wget unzip

      - wget https://github.com/aquasecurity/trivy/releases/download/v0.50.1/trivy_0.50.1_Linux-64bit.tar.gz

      - tar -xzf trivy_0.50.1_Linux-64bit.tar.gz

      - mv trivy /usr/local/bin/

      - wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip

      - unzip sonar-scanner-cli-5.0.1.3006-linux.zip

      - mv sonar-scanner-5.0.1.3006-linux /opt/sonar-scanner

      - export PATH=$PATH:/opt/sonar-scanner/bin

  pre_build:
    commands:

      - cd api

      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 539609142335.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:

      - sonar-scanner -Dproject.settings=sonar-codebuild-api.properties

      - docker build -t codepipeline-api-pipeline .

      - docker tag codepipeline-api-pipeline:latest 539609142335.dkr.ecr.ap-south-1.amazonaws.com/codepipeline-api-pipeline:latest

      - trivy image --format table -o trivy-report-api.txt codepipeline-api-pipeline:latest

      - cat trivy-report-api.txt

  post_build:
    commands:

      - docker push 539609142335.dkr.ecr.ap-south-1.amazonaws.com/codepipeline-api-pipeline:latest

artifacts:
  files:
    - api/trivy-report-api.txt
